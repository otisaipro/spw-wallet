<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SPW Wallet</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <header id="app-header" class="hidden">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="brand">SPW Wallet</span>
        <span class="net" id="net-status" title="Connected to spw.network">MAINNET</span>
      </div>
      <div style="display:flex;gap:4px">
        <button id="hdr-lock" class="lock-btn" title="Lock wallet">
          <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        </button>
        <button id="hdr-settings" class="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h0a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
        </button>
      </div>
    </header>

    <div id="content"></div>

    <nav id="bottom-nav" class="hidden">
      <button class="nav-btn" data-tab="home">
        <svg viewBox="0 0 24 24"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
        Home
      </button>
      <button class="nav-btn" data-tab="send">
        <svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        Send
      </button>
      <button class="nav-btn" data-tab="receive">
        <svg viewBox="0 0 24 24"><path d="m12 5v14"/><path d="m5 12 7 7 7-7"/></svg>
        Receive
      </button>
      <button class="nav-btn" data-tab="activity">
        <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Activity
      </button>
    </nav>

    <div id="toast"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
