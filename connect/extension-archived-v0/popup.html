<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SPW Wallet</title>
  <style>
    body { width: 300px; margin: 0; padding: 20px; background: #0a0e1a; color: #e5e7eb;
           font: 13px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
    .logo { text-align: center; font-size: 1.1rem; font-weight: 800;
            background: linear-gradient(135deg,#7c3aed,#00e0ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px; }
    .sub  { text-align: center; color: #6b7280; font-size: .75rem; margin-bottom: 20px; }
    .dot  { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: #10b981; margin-right: 6px; }
    .row  { padding: 10px 12px; background: #141928; border-radius: 8px; margin-bottom: 8px;
            font-size: .82rem; }
    a     { color: #00e0ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    button{ width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
            background: linear-gradient(135deg,#7c3aed,#00e0ff); color: white; font-weight: 700;
            margin-top: 10px; }
  </style>
</head>
<body>
  <div class="logo">SPW Wallet</div>
  <div class="sub"><span class="dot"></span>Active on this page</div>

  <div class="row">
    dApps on this page can now request sign-in via <code>window.spw</code>.
  </div>
  <div class="row">
    Your keys, accounts, and balance are in the full wallet.
  </div>

  <button id="open-wallet">Open Full Wallet</button>

  <script src="popup.js"></script>
</body>
</html>
